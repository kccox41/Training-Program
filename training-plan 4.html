<title>Training Plan</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; background: #0f0f13; color: #e5e7eb; min-height: 100vh; padding-bottom: env(safe-area-inset-bottom); }
  button { font-family: inherit; }
  input { font-family: inherit; }

  #app { max-width: 600px; margin: 0 auto; }

  /* HEADER */
  .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); border-bottom: 1px solid #1f2937; padding: 52px 20px 16px; display: flex; justify-content: space-between; align-items: flex-start; }
  .header-left .eyebrow { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .header-left .dot { width: 8px; height: 8px; border-radius: 50%; background: #3b82f6; }
  .header-left .label { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: #6b7280; }
  .header-left h1 { font-size: 22px; font-weight: 700; color: #f9fafb; }
  .header-left p { font-size: 13px; color: #6b7280; margin-top: 4px; }
  .edit-btn { padding: 8px 14px; border-radius: 10px; border: none; cursor: pointer; font-size: 12px; font-weight: 700; transition: all 0.2s; flex-shrink: 0; margin-left: 12px; }

  /* TABS */
  .tabs { border-bottom: 1px solid #1f2937; background: #111118; display: flex; }
  .tab-btn { padding: 12px 16px; font-size: 13px; font-weight: 600; background: none; border: none; cursor: pointer; border-bottom: 2px solid transparent; letter-spacing: 0.03em; transition: all 0.15s; flex: 1; }

  /* CONTENT */
  .content { padding: 20px 16px; }

  /* DAY SELECTOR */
  .day-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; margin-bottom: 20px; }
  .day-btn { padding: 10px 4px; border-radius: 10px; border: none; cursor: pointer; transition: all 0.2s; text-align: center; }
  .day-btn .day-num { font-size: 10px; font-weight: 700; letter-spacing: 0.05em; }
  .day-btn .day-type { font-size: 9px; margin-top: 2px; }
  .day-progress-bar { margin-top: 6px; height: 3px; border-radius: 2px; background: rgba(0,0,0,0.3); }
  .day-progress-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }

  /* DAY HEADER */

  .day-header .day-label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
  .day-header h2 { font-size: 18px; font-weight: 700; color: #f9fafb; }
  .day-header .day-sub { font-size: 12px; color: #6b7280; margin-top: 4px; }

  /* EDIT BANNER */

  /* EXERCISE LIST */
  .exercise-list { display: flex; flex-direction: column; gap: 10px; }

  .exercise-name { font-size: 14px; font-weight: 600; }
  .exercise-note { font-size: 11px; color: #6b7280; margin-top: 2px; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; display: flex; align-items: flex-end; }
  .modal-sheet { background: #15151f; border-radius: 20px 20px 0 0; padding: 24px; width: 100%; border: 1px solid #1f2937; padding-bottom: calc(24px + env(safe-area-inset-bottom)); }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .modal-title { font-size: 16px; font-weight: 700; color: #f9fafb; }
  .modal-cancel { background: #1f2937; border: none; color: #9ca3af; border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: 13px; }
  .modal-fields { display: flex; flex-direction: column; gap: 14px; }
  .modal-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field-label { font-size: 11px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; display: block; }
  .field-input { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #374151; background: #0f0f13; color: #f9fafb; font-size: 14px; outline: none; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .modal-save { flex: 1; padding: 12px; border-radius: 10px; border: none; cursor: pointer; color: #fff; font-size: 14px; font-weight: 700; }
  .modal-delete { padding: 12px 16px; border-radius: 10px; border: none; cursor: pointer; background: #3f1f1f; color: #ef4444; font-size: 14px; font-weight: 700; }

  /* CARDIO */
  .cardio-intro { background: #1a1a2e; border-radius: 12px; padding: 16px 20px; margin-bottom: 20px; border: 1px solid #1f2937; }
  .cardio-intro h3 { font-size: 13px; font-weight: 600; color: #f9fafb; margin-bottom: 6px; }
  .cardio-intro p { font-size: 13px; color: #9ca3af; line-height: 1.6; }
  .cardio-list { display: flex; flex-direction: column; gap: 12px; }
  .cardio-card { background: #15151f; border-radius: 12px; padding: 18px 20px; border: 1px solid #1f2937; border-left: 4px solid; }
  .cardio-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .cardio-name { font-size: 15px; font-weight: 700; color: #f9fafb; }
  .cardio-badge { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
  .cardio-meta { display: flex; gap: 20px; }
  .cardio-meta-item .meta-label { font-size: 10px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.08em; }

  /* NOTES */

  .note-card { background: #15151f; border-radius: 12px; padding: 16px 20px; border: 1px solid #1f2937; display: flex; gap: 12px; align-items: flex-start; }
  .note-icon { font-size: 20px; flex-shrink: 0; }
  .note-title { font-size: 14px; font-weight: 700; color: #f9fafb; margin-bottom: 4px; }
  .note-body { font-size: 13px; color: #9ca3af; line-height: 1.6; }
</style>

<body>

const cardioOptions = [
  { label: "Zone 2 Steady State", duration: "25–30 min", equipment: "Rower or Treadmill", intensity: "Low", color: "#0ea5e9" },
  { label: "HIIT Sprint Intervals", duration: "15–20 min", equipment: "Echo Bike", intensity: "High", color: "#ef4444" },
  { label: "Active Recovery Row", duration: "20 min", equipment: "Rogue Rower", intensity: "Very Low", color: "#22c55e" },
];

const programNotes = [
  { icon: "🗓️", title: "Schedule", body: "Train 6 days, rest Day 7. The PPL x2 structure hits each muscle group twice per week — optimal for recomposition at your training level." },
  { icon: "🥩", title: "Protein Target", body: "Aim for ~170g protein/day (1g per lb of bodyweight). This is the single most important nutrition variable for this goal." },
  { icon: "🔥", title: "Calorie Approach", body: "Eat at a mild deficit — 200 to 300 calories below maintenance. Aggressive cuts will cost you muscle. Recomp is a slow game." },
  { icon: "📈", title: "Progressive Overload", body: "Add weight or reps every 1–2 weeks on your main compound lifts (bench, squat, row, deadlift). Log your numbers." },
  { icon: "💤", title: "Recovery", body: "Sleep 7–9 hours. At 12% BF dropping to 8–9%, recovery becomes even more critical. Don't skip rest day." },
  { icon: "⚖️", title: "Timeline", body: "Expect 8–16 weeks to reach 8–9% BF at this pace while maintaining/building muscle. Don't rush it." },
];

// ── Storage: IndexedDB (works for local files on iOS Safari) ───────────────
const DB_NAME = 'TrainingPlanDB';
const DB_VER = 1;
const STORE = 'kv';
let db = null;

function openDB() {
  return new Promise((res, rej) => {
    if (db) return res(db);
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => e.target.result.createObjectStore(STORE);
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror = () => rej(req.error);
  });
}

async function dbGet(key) {
  const d = await openDB();
  return new Promise((res, rej) => {
    const tx = d.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).get(key);
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
}

async function dbSet(key, val) {
  const d = await openDB();
  return new Promise((res, rej) => {
    const tx = d.transaction(STORE, 'readwrite');
    const req = tx.objectStore(STORE).put(val, key);
    req.onsuccess = () => res();
    req.onerror = () => rej(req.error);
  });
}

async function loadPlanAsync() {
  try { const s = await dbGet(STORAGE_KEY); return s ? s : defaultPlan; } catch(e) { return defaultPlan; }
}
async function savePlan(plan) {
  try { await dbSet(STORAGE_KEY, plan); } catch(e) {}
}
async function loadSetsAsync() {
  try { const s = await dbGet(SETS_KEY); return s ? s : {}; } catch(e) { return {}; }
}
async function saveSets(sets) {
  try { await dbSet(SETS_KEY, sets); } catch(e) {}
}

// Legacy localStorage migration (run once)
async function migrateFromLocalStorage() {
  try {
    const oldPlan = localStorage.getItem(STORAGE_KEY);
    const oldSets = localStorage.getItem(SETS_KEY);
    if (oldPlan) { await dbSet(STORAGE_KEY, JSON.parse(oldPlan)); localStorage.removeItem(STORAGE_KEY); }
    if (oldSets) { await dbSet(SETS_KEY, JSON.parse(oldSets)); localStorage.removeItem(SETS_KEY); }
  } catch(e) {}
}

let plan = defaultPlan;
let completedSets = {};
let activeDay = 0;
let activeTab = 'plan';
let editMode = false;
let editingEx = null; // index or null

// Boot: show app immediately with defaults, then hydrate from IndexedDB
render(); // render instantly so screen is never blank

(async () => {
  try {
    await migrateFromLocalStorage();
    const savedPlan = await loadPlanAsync();
    const savedSets = await loadSetsAsync();
    // Only re-render if we got real saved data
    if (savedPlan && savedPlan.days) { plan = savedPlan; }
    if (savedSets) { completedSets = savedSets; }
    render();
  } catch(e) {
    console.warn('Storage load failed, using defaults:', e);
    // App already rendered with defaults above — no problem
  }
})();

// ── Helpers ────────────────────────────────────────────────────────────────
function setKey(dayIdx, exIdx, setIdx) { return `${dayIdx}-${exIdx}-${setIdx}`; }
function isSetDone(exIdx, setIdx) { return !!completedSets[setKey(activeDay, exIdx, setIdx)]; }
function dayProgress(dayIdx) {
  const day = plan.days[dayIdx];
  let total = 0, done = 0;
  day.exercises.forEach((ex, ei) => {
    const n = parseInt(ex.sets);
    for (let s = 0; s < n; s++) { total++; if (completedSets[setKey(dayIdx, ei, s)]) done++; }
  });
  return total === 0 ? 0 : Math.round(done / total * 100);
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  const day = plan.days[activeDay];

  app.innerHTML = `
    ${renderHeader(day)}
    ${renderTabs()}
    <div class="content">
      ${activeTab === 'plan' ? renderPlan(day) : ''}
      ${activeTab === 'cardio' ? renderCardio() : ''}
      ${activeTab === 'notes' ? renderNotes() : ''}
    </div>
    ${editingEx !== null ? renderModal(day) : ''}
  `;

  attachEvents();
}

function renderHeader(day) {
  const editBtnStyle = editMode
    ? `background:#3b82f6;color:#fff;`
    : `background:#1f2937;color:#9ca3af;`;
  return `
    <div class="header">
      <div class="header-left">
        <div class="eyebrow"><div class="dot"></div><span class="label">6-Day PPL Split</span></div>
        <h1>Body Recomposition Plan</h1>
        <p>5'7" · 170 lbs · 12% BF → Target 8–9% BF</p>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0;margin-left:12px;align-items:flex-end">
        <button class="edit-btn" id="editToggle" style="${editBtnStyle}">${editMode ? '✓ Done' : '✏️ Edit'}</button>
        <div style="display:flex;gap:6px">
          <button class="edit-btn" id="exportBtn" style="background:#1f2937;color:#9ca3af;font-size:11px;padding:5px 10px">💾 Save</button>
          <button class="edit-btn" id="importBtn" style="background:#1f2937;color:#9ca3af;font-size:11px;padding:5px 10px">📂 Load</button>
        </div>
      </div>
    </div>
    <input type="file" id="importFile" accept=".json" style="display:none">`;
}

function renderTabs() {
  const tabs = [['plan','Training Plan'],['cardio','Cardio'],['notes','Program Notes']];
  return `<div class="tabs">${tabs.map(([id,label]) => `
    <button class="tab-btn" data-tab="${id}" style="color:${activeTab===id?'#3b82f6':'#6b7280'};border-bottom-color:${activeTab===id?'#3b82f6':'transparent'}">${label}</button>
  `).join('')}</div>`;
}

function renderPlan(day) {
  const prog = (i) => dayProgress(i);
  return `
    <div class="day-grid">
      ${plan.days.map((d,i) => {
        const p = prog(i);
        const active = i === activeDay;
        return `<button class="day-btn" data-day="${i}" style="background:${active ? d.color : '#1a1a2e'}">
          <div class="day-num" style="color:${active?'#fff':'#6b7280'}">${d.day.toUpperCase()}</div>
          <div class="day-type" style="color:${active?'rgba(255,255,255,0.8)':'#4b5563'}">${d.label.split('—')[0].trim()}</div>
          ${p > 0 ? `<div class="day-progress-bar"><div class="day-progress-fill" style="width:${p}%;background:${active?'rgba(255,255,255,0.7)':d.color}"></div></div>` : ''}
        </button>`;
      }).join('')}
    </div>

    <div class="day-header" style="border-left-color:${day.color}">
      <div class="day-label" style="color:${day.color}">${day.day}</div>
      <h2>${day.label}</h2>
      <div class="day-sub">${day.exercises.length} exercises · ${editMode ? 'Tap an exercise to edit or delete' : 'Tap sets to track progress'}</div>
    </div>

    ${editMode ? `<div class="edit-banner">✏️ Edit mode on — tap any exercise to rename, adjust sets/reps, or delete it.</div>` : ''}

    <div class="exercise-list">
      ${day.exercises.map((ex, ei) => {
        const numSets = parseInt(ex.sets);
        const doneSets = Array.from({length:numSets},(_,s)=>isSetDone(ei,s)).filter(Boolean).length;
        const allDone = doneSets === numSets && !editMode;
        return `
          <div class="exercise-card" data-ex="${ei}"
            style="background:${allDone?'#0d1f0d':editMode?'#1a1520':'#15151f'};border-color:${allDone?'#166534':editMode?'#4b3f6b':'#1f2937'};cursor:${editMode?'pointer':'default'}">
            <div class="exercise-top" style="margin-bottom:${editMode?'0':'10px'}">
              <div>
                <div class="exercise-name" style="color:${allDone?'#4ade80':'#f3f4f6'}">${ex.name}</div>
                ${ex.note ? `<div class="exercise-note" style="color:${editMode?'#4b5563':'#6b7280'}">${ex.note}</div>` : ''}
              </div>
              <div style="display:flex;align-items:center;gap:8px;margin-left:12px;flex-shrink:0">
                <span class="exercise-sets-label" style="color:${day.color}">${ex.sets} × ${ex.reps}</span>
                ${editMode ? `<span style="font-size:16px;color:#6b7280">›</span>` : ''}
              </div>
            </div>
            ${!editMode ? `
              <div class="set-buttons">
                ${Array.from({length:numSets},(_,s) => `
                  <button class="set-btn" data-ex="${ei}" data-set="${s}"
                    style="background:${isSetDone(ei,s)?day.color:'#1f2937'};color:${isSetDone(ei,s)?'#fff':'#6b7280'}">
                    ${isSetDone(ei,s)?'✓':s+1}
                  </button>`).join('')}
                <span class="set-count">${doneSets}/${numSets} sets</span>
              </div>` : ''}
          </div>`;
      }).join('')}
      ${editMode ? `<button class="add-exercise-btn" id="addExBtn">+ Add Exercise</button>` : ''}
    </div>`;
}

// ── Events ─────────────────────────────────────────────────────────────────
function attachEvents() {
  // Tabs
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => { activeTab = btn.dataset.tab; render(); });
  });

  // Edit toggle
  const editToggle = document.getElementById('editToggle');
  if (editToggle) editToggle.addEventListener('click', () => { editMode = !editMode; editingEx = null; render(); });

  // Export backup
  const exportBtn = document.getElementById('exportBtn');
  if (exportBtn) exportBtn.addEventListener('click', () => {
    const data = JSON.stringify({ plan, completedSets, exported: new Date().toISOString() }, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'training-backup-' + new Date().toISOString().slice(0,10) + '.json';
    a.click();
    URL.revokeObjectURL(url);
  });

  // Import backup
  const importBtn = document.getElementById('importBtn');
  const importFile = document.getElementById('importFile');
  if (importBtn && importFile) {
    importBtn.addEventListener('click', () => importFile.click());
    importFile.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      try {
        const text = await file.text();
        const data = JSON.parse(text);
        if (data.plan && data.plan.days) {
          plan = data.plan;
          completedSets = data.completedSets || {};
          await savePlan(plan);
          await saveSets(completedSets);
          importFile.value = '';
          render();
        } else { alert('Invalid backup file.'); }
      } catch(err) { alert('Could not read file: ' + err.message); }
    });
  }

  // Day buttons
  document.querySelectorAll('.day-btn').forEach(btn => {
    btn.addEventListener('click', () => { activeDay = parseInt(btn.dataset.day); render(); });
  });

  // Set buttons
  document.querySelectorAll('.set-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const ei = parseInt(btn.dataset.ex);
      const si = parseInt(btn.dataset.set);
      const key = setKey(activeDay, ei, si);
      completedSets[key] = !completedSets[key];
      saveSets(completedSets);
      render();
    });
  });

  // Exercise cards (edit mode)
  if (editMode) {
    document.querySelectorAll('.exercise-card').forEach(card => {
      card.addEventListener('click', () => { editingEx = parseInt(card.dataset.ex); render(); });
    });
    const addBtn = document.getElementById('addExBtn');
    if (addBtn) addBtn.addEventListener('click', () => {
      plan.days[activeDay].exercises.push({ name: "New Exercise", sets: "3", reps: "10–12", note: "" });
      savePlan(plan);
      editingEx = plan.days[activeDay].exercises.length - 1;
      render();
    });
  }

  // Modal
  const modalCancel = document.getElementById('modalCancel');
  if (modalCancel) modalCancel.addEventListener('click', () => { editingEx = null; render(); });

  const modalOverlay = document.getElementById('modalOverlay');
  if (modalOverlay) modalOverlay.addEventListener('click', (e) => {
    if (e.target === modalOverlay) { editingEx = null; render(); }
  });

  const modalSave = document.getElementById('modalSave');
  if (modalSave) modalSave.addEventListener('click', () => {
    plan.days[activeDay].exercises[editingEx] = {
      name: document.getElementById('fieldName').value,
      sets: document.getElementById('fieldSets').value,
      reps: document.getElementById('fieldReps').value,
      note: document.getElementById('fieldNote').value,
    };
    savePlan(plan);
    editingEx = null;
    render();
  });

  const modalDelete = document.getElementById('modalDelete');
  if (modalDelete) modalDelete.addEventListener('click', () => {
    plan.days[activeDay].exercises.splice(editingEx, 1);
    savePlan(plan);
    editingEx = null;
    render();
  });
}


// ── PWA: Install prompt & Service Worker ───────────────────────────────────
let deferredInstallPrompt = null;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  showInstallBanner();
});

function showInstallBanner() {
  if (document.getElementById('installBanner')) return;
  const banner = document.createElement('div');
  banner.id = 'installBanner';
  banner.style.cssText = `
    position: fixed; bottom: calc(20px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
    background: #1a1a2e; border: 1px solid #3b82f6; border-radius: 14px;
    padding: 12px 18px; display: flex; align-items: center; gap: 12px;
    z-index: 999; max-width: 340px; width: calc(100% - 40px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  `;
  banner.innerHTML = `
    <span style="font-size:24px">💪</span>
    <div style="flex:1">
      <div style="font-size:13px;font-weight:700;color:#f9fafb">Add to Home Screen</div>
      <div style="font-size:11px;color:#6b7280;margin-top:2px">Install for offline access & native feel</div>
    </div>
    <button id="installBtn" style="background:#3b82f6;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap">Install</button>
    <button id="dismissBanner" style="background:none;border:none;color:#6b7280;font-size:18px;cursor:pointer;padding:0 4px">✕</button>
  `;
  document.body.appendChild(banner);

  document.getElementById('installBtn').addEventListener('click', async () => {
    if (!deferredInstallPrompt) return;
    deferredInstallPrompt.prompt();
    const { outcome } = await deferredInstallPrompt.userChoice;
    deferredInstallPrompt = null;
    banner.remove();
  });

  document.getElementById('dismissBanner').addEventListener('click', () => {
    banner.remove();
    localStorage.setItem('installDismissed', '1');
  });
}

// iOS doesn't fire beforeinstallprompt — show manual instructions instead
function isIOS() { return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream; }
function isInStandaloneMode() { return window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches; }

if (isIOS() && !isInStandaloneMode() && !localStorage.getItem('iosDismissed')) {
  setTimeout(() => {
    if (document.getElementById('iosBanner')) return;
    const banner = document.createElement('div');
    banner.id = 'iosBanner';
    banner.style.cssText = `
      position: fixed; bottom: calc(20px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
      background: #1a1a2e; border: 1px solid #3b82f6; border-radius: 14px;
      padding: 14px 16px; z-index: 999; max-width: 340px; width: calc(100% - 40px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    `;
    banner.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:20px">💪</span>
          <span style="font-size:13px;font-weight:700;color:#f9fafb">Add to Home Screen</span>
        </div>
        <button id="iosDismiss" style="background:none;border:none;color:#6b7280;font-size:18px;cursor:pointer">✕</button>
      </div>
      <div style="font-size:12px;color:#9ca3af;line-height:1.7">
        1. Tap the <strong style="color:#3b82f6">Share button</strong> <span style="font-size:14px">⬆</span> at the bottom of Safari<br>
        2. Scroll down and tap <strong style="color:#3b82f6">"Add to Home Screen"</strong><br>
        3. Tap <strong style="color:#3b82f6">Add</strong> — your app icon will appear!
      </div>
    `;
    document.body.appendChild(banner);
    document.getElementById('iosDismiss').addEventListener('click', () => {
      banner.remove();
      localStorage.setItem('iosDismissed', '1');
    });
  }, 1500);
}

// ── Service Worker (inline via blob for single-file distribution) ──────────
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'training-plan-v1';
    const ASSETS = [self.location.href.replace('/sw.js','') || '/'];

    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)));
      self.skipWaiting();
    });

    self.addEventListener('activate', e => {
      e.waitUntil(caches.keys().then(keys =>
        Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
      ));
      self.clients.claim();
    });

    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(cached => cached || fetch(e.request).then(res => {
          if (res && res.status === 200 && res.type === 'basic') {
            const clone = res.clone();
            caches.open(CACHE).then(c => c.put(e.request, clone));
          }
          return res;
        }).catch(() => caches.match('/') || new Response('Offline', {status: 503})))
      );
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swURL = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swURL).catch(() => {});
}
